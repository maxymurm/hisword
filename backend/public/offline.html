<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline – PocketSword</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f9fafb;
            color: #374151;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #111827;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }
        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: #4338ca; }
        .tip {
            margin-top: 2rem;
            padding: 1rem;
            background: #f3f4f6;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            color: #6b7280;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #030712; color: #d1d5db; }
            h1 { color: #f9fafb; }
            p { color: #9ca3af; }
            .tip { background: #111827; color: #9ca3af; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📖</div>
        <h1>You're Offline</h1>
        <p>
            It looks like you've lost your internet connection.
            Previously read chapters are still available offline.
        </p>
        <button class="retry-btn" onclick="window.location.reload()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 4v6h6M23 20v-6h-6"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
            Try Again
        </button>
        <div class="tip">
            💡 <strong>Tip:</strong> Open Bible chapters while online and they'll be cached for offline reading.
        </div>
    </div>
</body>
</html>
